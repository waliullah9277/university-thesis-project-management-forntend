<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Projects</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="bg-gray-100 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white shadow px-6 py-4 flex justify-between items-center">
      <h1 class="text-xl font-bold text-gray-800">Student Projects</h1>

      <div class="flex items-center gap-3">
        <a
          href="dashboard.html"
          class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg"
        >
          Dashboard
        </a>

        <a
          href="teams.html"
          class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg"
        >
          Teams
        </a>

        <button
          onclick="logoutUser()"
          class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg"
        >
          Logout
        </button>
      </div>
    </nav>

    <main class="p-6">
      <!-- Feedback Modal -->
      <div
        id="feedbackModal"
        class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4"
      >
        <div class="bg-white w-full max-w-lg rounded-lg shadow-lg p-6">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold">Project Feedbacks</h2>

            <button
              onclick="closeFeedbackModal()"
              class="text-red-600 font-bold text-xl"
            >
              ✕
            </button>
          </div>

          <div id="feedbackList" class="space-y-3 max-h-96 overflow-y-auto">
            <p class="text-gray-500">Loading feedbacks...</p>
          </div>
        </div>
      </div>

      <!-- Project Submit Form -->
      <div class="bg-white p-6 rounded-lg shadow mb-6">
        <h2 class="text-2xl font-bold mb-4">Submit Project</h2>

        <form id="projectForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1">Team</label>
            <select
              id="team"
              class="w-full border px-4 py-2 rounded-lg"
              required
            >
              <option value="">Loading teams...</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Project Type</label>
            <select
              id="project_type"
              class="w-full border px-4 py-2 rounded-lg"
              required
            >
              <option value="">Select Type</option>
              <option value="PROJECT">Project</option>
              <option value="THESIS">Thesis</option>
            </select>
          </div>

          <div class="md:col-span-2">
            <label class="block text-sm font-medium mb-1">Project Title</label>
            <input
              type="text"
              id="title"
              placeholder="University Project and Thesis Management System"
              class="w-full border px-4 py-2 rounded-lg"
              required
            />
          </div>

          <div class="md:col-span-2">
            <label class="block text-sm font-medium mb-1"
              >Technology Stack</label
            >
            <input
              type="text"
              id="technology_stack"
              placeholder="Django REST Framework, HTML, Tailwind CSS, JavaScript"
              class="w-full border px-4 py-2 rounded-lg"
              required
            />
          </div>

          <div class="md:col-span-2">
            <label class="block text-sm font-medium mb-1">Description</label>
            <textarea
              id="description"
              rows="4"
              placeholder="Write project description..."
              class="w-full border px-4 py-2 rounded-lg"
              required
            ></textarea>
          </div>

          <div class="md:col-span-2">
            <button
              type="submit"
              class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg"
            >
              Submit Project
            </button>
          </div>
        </form>

        <p id="message" class="mt-4 text-sm"></p>
      </div>

      <!-- Project List -->
      <div class="bg-white p-6 rounded-lg shadow">
        <h2 class="text-2xl font-bold mb-4">My Submitted Projects</h2>

        <div id="projectList" class="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <p class="text-gray-500">Loading projects...</p>
        </div>
      </div>
    </main>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/student-projects.js"></script>
  </body>
</html>
