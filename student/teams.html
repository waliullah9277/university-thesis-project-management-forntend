<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Team</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white shadow px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-gray-800">Student Team</h1>

    <div class="flex items-center gap-3">
      <a href="dashboard.html" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg">
        Dashboard
      </a>

      <a href="projects.html" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">
        Projects
      </a>

      <button 
        onclick="logoutUser()"
        class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg"
      >
        Logout
      </button>
    </div>
  </nav>

  <main class="p-6">

    <!-- Create Team Form -->
    <div class="bg-white p-6 rounded-lg shadow mb-6">
      <h2 class="text-2xl font-bold mb-4">Create Team</h2>

      <form id="teamForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">Team Name</label>
          <input 
            type="text"
            id="team_name"
            placeholder="Example: Team Alpha"
            class="w-full border px-4 py-2 rounded-lg"
            required
          />
        </div>

        <button 
          type="submit"
          class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg"
        >
          Create Team
        </button>
      </form>

      <p id="message" class="mt-4 text-sm"></p>
    </div>


    <!-- Team List -->
    <div class="bg-white p-6 rounded-lg shadow">
      <h2 class="text-2xl font-bold mb-4">My Teams</h2>

      <div id="teamList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <p class="text-gray-500">Loading teams...</p>
      </div>
    </div>

  </main>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/student-teams.js"></script>

</body>
</html>
