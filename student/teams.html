<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Team</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="bg-slate-800 text-white shadow-lg px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">Student Team</h1>

    <div class="flex items-center gap-3">
      <a
        href="dashboard.html"
        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 font-medium"
      >
        Dashboard
      </a>

      <button
        onclick="logoutUser()"
        class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 font-medium"
      >
        Logout
      </button>
    </div>
  </nav>

  <main class="p-6 flex-1">

    <div class="mb-6">
      <h2 class="text-3xl font-bold text-gray-800">My Teams</h2>
      <p class="text-gray-500 mt-1">
        Create your project team and manage team information.
      </p>
    </div>

    <!-- Create Team -->
    <section class="bg-white shadow-md border p-6 mb-6">

      <div class="mb-5">
        <h2 class="text-xl font-bold text-gray-800">Create Team</h2>
        <p class="text-gray-500 text-sm">
          Create a new team for your university project or thesis.
        </p>
      </div>

      <form id="teamForm" class="space-y-4">

        <div>
          <label class="block text-sm font-medium mb-1">
            Team Name
          </label>

          <input
            type="text"
            id="team_name"
            placeholder="Example: Team Alpha"
            class="w-full border px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            required
          />
        </div>

        <button
          type="submit"
          class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 font-medium shadow"
        >
          Create Team
        </button>

      </form>

      <p id="message" class="mt-4 text-sm"></p>

    </section>

    <!-- Team List -->
    <section class="bg-white shadow-md border p-6">

      <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-3 mb-5">

        <div>
          <h2 class="text-xl font-bold text-gray-800">
            My Teams
          </h2>

          <p class="text-gray-500 text-sm">
            View all your created teams.
          </p>
        </div>

        <button
          onclick="loadTeams()"
          class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 font-medium"
        >
          Refresh
        </button>

      </div>

      <div
        id="teamList"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"
      >
        <p class="text-gray-500">
          Loading teams...
        </p>
      </div>

    </section>

  </main>

  <footer class="bg-slate-800 border-t py-4 text-center text-sm text-white">
    © 2026 University Project and Thesis Management System. All rights
    reserved.
  </footer>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/student-teams.js"></script>

</body>
</html>
