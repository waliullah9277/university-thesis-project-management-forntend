<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Profile</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<nav class="bg-slate-800 shadow px-6 py-4 flex justify-between items-center">
  <h1 class="text-xl font-bold text-white">My Profile</h1>

  <div class="flex items-center gap-3">
    <a
      href="dashboard.html"
      class="bg-gray-700 hover:bg-gray-800 text-white px-4 py-2"
    >
      Dashboard
    </a>

    <button
      onclick="logoutUser()"
      class="bg-red-600 hover:bg-red-700 text-white px-4 py-2"
    >
      Logout
    </button>
  </div>
</nav>

<main class="p-6 flex-1">

  <div class="max-w-4xl mx-auto">

    <div class="mb-6">
      <h2 class="text-3xl font-bold text-gray-800">Profile Overview</h2>
      <p class="text-gray-500 mt-1">
        View your account information and manage your password.
      </p>
    </div>

    <section class="bg-white shadow-md border p-6 mb-6">
      <div class="flex flex-col items-center text-center">

        <div class="relative">
          <img
            id="profileImage"
            src="https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff"
            class="w-36 h-36 object-cover border-4 border-blue-500 shadow-lg"
            alt="Profile Image"
          />
        </div>

        <label class="mt-5 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 cursor-pointer">
          Upload Image
          <input type="file" id="imageInput" accept="image/*" class="hidden" />
        </label>

        <p class="text-xs text-gray-500 mt-2">
          Image will be saved in this browser only.
        </p>
      </div>

      <div id="profileBox" class="mt-8">
        <p class="text-gray-500 text-center">Loading profile...</p>
      </div>

      <div class="mt-8 flex flex-col md:flex-row gap-4 justify-center">
        <button
          onclick="alert('Profile update API is not connected yet.')"
          class="bg-green-600 hover:bg-green-700 text-white px-6 py-2"
        >
          Update Profile
        </button>

        <button
          onclick="openPasswordModal()"
          class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2"
        >
          Change Password
        </button>
      </div>
    </section>

  </div>

</main>

<!-- Password Change Modal -->
<div
  id="passwordModal"
  class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4"
>
  <div class="bg-white w-full max-w-md shadow-lg p-6">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold text-gray-800">Change Password</h2>

      <button onclick="closePasswordModal()" class="text-red-600 font-bold text-xl">
        ✕
      </button>
    </div>

    <form id="changePasswordForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1">Current Password</label>
        <input
          type="password"
          id="current_password"
          class="w-full border px-4 py-2"
          required
        />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">New Password</label>
        <input
          type="password"
          id="new_password"
          class="w-full border px-4 py-2"
          required
        />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Confirm Password</label>
        <input
          type="password"
          id="confirm_password"
          class="w-full border px-4 py-2"
          required
        />
      </div>

      <button class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2">
        Change Password
      </button>
    </form>

    <p id="passwordMessage" class="mt-4 text-sm text-center"></p>
  </div>
</div>

<footer class="bg-slate-800 border-t py-4 text-center text-sm text-white">
  © 2026 University Project and Thesis Management System. All rights reserved.
</footer>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/ui.js"></script>
<script src="../assets/js/profile.js"></script>

</body>
</html>
