<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Supervisor Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 min-h-screen">

  <nav class="bg-white shadow px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-gray-800">Supervisor Dashboard</h1>

    <div class="flex items-center gap-3">
      <a
        href="projects.html"
        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium"
      >
        Assigned Projects
      </a>

      <a
        href="reports.html"
        class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg font-medium"
      >
        Reports
      </a>

      <button
        onclick="logoutUser()"
        class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-medium"
      >
        Logout
      </button>
    </div>
  </nav>

  <main class="p-6">
    <h2 class="text-2xl font-bold mb-6">Welcome, Supervisor</h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="bg-white p-5 rounded-lg shadow">
        <h3 class="text-gray-500">Assigned Projects</h3>
        <p id="assignedProjects" class="text-3xl font-bold mt-2">0</p>
      </div>

      <div class="bg-white p-5 rounded-lg shadow">
        <h3 class="text-gray-500">Pending Reports</h3>
        <p id="pendingReports" class="text-3xl font-bold mt-2">0</p>
      </div>

      <div class="bg-white p-5 rounded-lg shadow">
        <h3 class="text-gray-500">Reviewed Reports</h3>
        <p id="reviewedReports" class="text-3xl font-bold mt-2">0</p>
      </div>
    </div>
  </main>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/supervisor-dashboard.js"></script>

</body>
</html>
