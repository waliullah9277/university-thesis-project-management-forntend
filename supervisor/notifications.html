<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Notifications</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<nav class="bg-slate-800 text-white shadow-lg px-6 py-4 flex justify-between items-center">
  <h1 class="text-xl font-bold">Notifications</h1>

  <div class="flex items-center gap-3">
    <a href="dashboard.html" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 font-medium">
      Dashboard
    </a>

    <button onclick="logoutUser()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 font-medium">
      Logout
    </button>
  </div>
</nav>

<main class="p-6 flex-1">
  <div class="mb-6">
    <h2 class="text-3xl font-bold text-gray-800">My Notifications</h2>
    <p class="text-gray-500 mt-1">
      View your latest system notifications and important updates.
    </p>
  </div>

  <section class="bg-white shadow-md border p-6">
    <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-3 mb-5">
      <div>
        <h2 class="text-xl font-bold text-gray-800">Notification Center</h2>
        <p class="text-gray-500 text-sm">
          All important messages from the system.
        </p>
      </div>

      <button onclick="loadNotifications()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 font-medium">
        Refresh
      </button>
    </div>

    <div id="notificationList" class="space-y-4">
      <p class="text-gray-500 text-center py-6">Loading notifications...</p>
    </div>
  </section>
</main>

<footer class="bg-slate-800 border-t py-4 text-center text-sm text-white">
  © 2026 University Project and Thesis Management System. All rights
  reserved.
</footer>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/ui.js"></script>
<script src="../assets/js/user-notifications.js"></script>

</body>
</html>
