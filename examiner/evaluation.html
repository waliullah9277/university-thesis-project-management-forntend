<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Evaluation</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 min-h-screen">

  <nav class="bg-white shadow px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-gray-800">Evaluation</h1>

    <div class="flex items-center gap-3">
      <a href="dashboard.html" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg">Dashboard</a>
      <a href="viva.html" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">Assigned Viva</a>

      <button onclick="logoutUser()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg">
        Logout
      </button>
    </div>
  </nav>

  <main class="p-6">

    <div class="bg-white p-6 rounded-lg shadow mb-6">
      <h2 class="text-2xl font-bold mb-4">Submit Evaluation</h2>

      <form id="evaluationForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <div class="md:col-span-2">
          <label class="block text-sm font-medium mb-1">Project</label>
          <select id="project" class="w-full border px-4 py-2 rounded-lg" required>
            <option value="">Loading projects...</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Proposal Marks</label>
          <input type="number" id="proposal_marks" min="0" max="30" class="w-full border px-4 py-2 rounded-lg" required />
          <p class="text-xs text-gray-500 mt-1">Maximum 30</p>
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Progress Marks</label>
          <input type="number" id="progress_marks" min="0" max="30" class="w-full border px-4 py-2 rounded-lg" required />
          <p class="text-xs text-gray-500 mt-1">Maximum 30</p>
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Viva Marks</label>
          <input type="number" id="viva_marks" min="0" max="40" class="w-full border px-4 py-2 rounded-lg" required />
          <p class="text-xs text-gray-500 mt-1">Maximum 40</p>
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Total Marks</label>
          <input type="text" id="total_marks" class="w-full border px-4 py-2 rounded-lg bg-gray-100" readonly />
        </div>

        <div class="md:col-span-2">
          <label class="block text-sm font-medium mb-1">Remarks</label>
          <textarea id="remarks" rows="4" class="w-full border px-4 py-2 rounded-lg" placeholder="Excellent work..." required></textarea>
        </div>

        <div class="md:col-span-2">
          <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg">
            Submit Evaluation
          </button>
        </div>
      </form>

      <p id="message" class="mt-4 text-sm"></p>
    </div>

    <div class="bg-white p-6 rounded-lg shadow">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-bold">My Evaluations</h2>

        <button onclick="loadEvaluations()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg">
          Refresh
        </button>
      </div>

      <div id="evaluationList" class="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <p class="text-gray-500">Loading evaluations...</p>
      </div>
    </div>

  </main>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/examiner-evaluation.js"></script>

</body>
</html>
