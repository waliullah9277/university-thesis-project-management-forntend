<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Supervisor Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen bg-slate-900 flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-white shadow-2xl border">
    <div class="bg-slate-800 text-white p-6 text-center">
      <h1 class="text-2xl font-bold">Supervisor Login</h1>
      <p class="text-slate-300 text-sm mt-1">University Project Management System</p>
    </div>

    <form id="loginForm" class="p-8 space-y-5">
      <input type="hidden" id="expectedRole" value="SUPERVISOR" />

      <div>
        <label class="block text-sm font-medium mb-1">Email</label>
        <input
          type="text"
          id="login_id"
          placeholder="admin@gmail.com"
          class="w-full border px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Admin@12345"
          class="w-full border px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        />
      </div>

      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 font-medium">
        Login as Supervisor
      </button>

      <p id="message"></p>

      <div class="text-center text-sm">
        <a href="login.html" class="text-blue-600 hover:underline">Back to login options</a>
      </div>
    </form>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/role-login.js"></script>
</body>
</html>
