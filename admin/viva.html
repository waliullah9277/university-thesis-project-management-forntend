<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Viva Management</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white shadow px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-gray-800">Viva Management</h1>

    <div class="flex items-center gap-3">
      <a
        href="dashboard.html"
        class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg font-medium"
      >
        Dashboard
      </a>

      <a
        href="projects.html"
        class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg font-medium"
      >
        Projects
      </a>

      <a
        href="users.html"
        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium"
      >
        Users
      </a>

      <button
        onclick="logoutUser()"
        class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-medium"
      >
        Logout
      </button>
    </div>
  </nav>

  <main class="p-6">

    <!-- Viva Create Form -->
    <div class="bg-white p-6 rounded-lg shadow mb-6">
      <h2 class="text-2xl font-bold mb-4">Create Viva Schedule</h2>

      <form id="vivaForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <div class="md:col-span-2">
          <label class="block text-sm font-medium mb-1">Project</label>
          <select
            id="project"
            class="w-full border px-4 py-2 rounded-lg"
            required
          >
            <option value="">Loading projects...</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Date</label>
          <input
            type="date"
            id="date"
            class="w-full border px-4 py-2 rounded-lg"
            required
          />
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Time</label>
          <input
            type="time"
            id="time"
            class="w-full border px-4 py-2 rounded-lg"
            required
          />
        </div>

        <div class="md:col-span-2">
          <label class="block text-sm font-medium mb-1">Room</label>
          <input
            type="text"
            id="room"
            placeholder="Room 301"
            class="w-full border px-4 py-2 rounded-lg"
            required
          />
        </div>

        <div class="md:col-span-2">
          <button
            type="submit"
            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg"
          >
            Create Viva
          </button>
        </div>
      </form>

      <p id="message" class="mt-4 text-sm"></p>
    </div>


    <!-- Viva List -->
    <div class="bg-white p-6 rounded-lg shadow">
      <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-4">
        <div>
          <h2 class="text-2xl font-bold">All Viva Schedules</h2>
          <p class="text-gray-500">Create viva, assign examiner, and monitor status</p>
        </div>

        <button
          onclick="loadVivas()"
          class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg"
        >
          Refresh
        </button>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full border-collapse">
          <thead>
            <tr class="bg-gray-200 text-left">
              <th class="p-3 border">ID</th>
              <th class="p-3 border">Project</th>
              <th class="p-3 border">Date</th>
              <th class="p-3 border">Time</th>
              <th class="p-3 border">Room</th>
              <th class="p-3 border">Examiner</th>
              <th class="p-3 border">Status</th>
              <th class="p-3 border">Assign Examiner</th>
            </tr>
          </thead>

          <tbody id="vivaTableBody">
            <tr>
              <td colspan="8" class="p-4 text-center text-gray-500">
                Loading vivas...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/admin-viva.js"></script>

</body>
</html>
