<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Evaluation Management</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 min-h-screen">

  <nav class="bg-white shadow px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-gray-800">Evaluation Management</h1>

    <div class="flex items-center gap-3">
      <a href="dashboard.html" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg">Dashboard</a>
      <a href="users.html" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">Users</a>
      <a href="projects.html" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg">Projects</a>
      <a href="viva.html" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg">Viva</a>

      <button onclick="logoutUser()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg">
        Logout
      </button>
    </div>
  </nav>

  <main class="p-6">

    <div class="bg-white p-6 rounded-lg shadow">
      <div class="flex justify-between items-center mb-4">
        <div>
          <h2 class="text-2xl font-bold">All Evaluations</h2>
          <p class="text-gray-500">Review and publish student results</p>
        </div>

        <button onclick="loadAdminEvaluations()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg">
          Refresh
        </button>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full border-collapse">
          <thead>
            <tr class="bg-gray-200 text-left">
              <th class="p-3 border">ID</th>
              <th class="p-3 border">Project</th>
              <th class="p-3 border">Examiner</th>
              <th class="p-3 border">Proposal</th>
              <th class="p-3 border">Progress</th>
              <th class="p-3 border">Viva</th>
              <th class="p-3 border">Total</th>
              <th class="p-3 border">Published</th>
              <th class="p-3 border">Action</th>
            </tr>
          </thead>

          <tbody id="evaluationTableBody">
            <tr>
              <td colspan="9" class="p-4 text-center text-gray-500">
                Loading evaluations...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/admin-evaluation.js"></script>

</body>
</html>
