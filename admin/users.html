<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Management</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 min-h-screen">

  <!-- Navbar -->

  <nav class="bg-white shadow px-6 py-4 flex justify-between items-center">
      <h1 class="text-xl font-bold text-gray-800">User Management</h1>

      <div class="flex items-center gap-3">
        <a
          href="dashboard.html"
          class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium"
        >
          Dashboard
        </a>

        <button
          onclick="logoutUser()"
          class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-medium"
        >
          Logout
        </button>
      </div>
    </nav>

  <main class="p-6">

    <!-- Create User Form -->
    <div class="bg-white p-6 rounded-lg shadow mb-6">
      <h2 class="text-2xl font-bold mb-4">Create New User</h2>

      <form id="createUserForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <div>
          <label class="block text-sm font-medium mb-1">Role</label>
          <select id="role" class="w-full border px-4 py-2 rounded-lg" required>
            <option value="">Select Role</option>
            <option value="STUDENT">Student</option>
            <option value="SUPERVISOR">Supervisor</option>
            <option value="EXAMINER">Examiner</option>
          </select>
        </div>

        <div id="studentIdBox">
          <label class="block text-sm font-medium mb-1">Student ID</label>
          <input 
            type="text" 
            id="student_id"
            placeholder="Example: 221359277"
            class="w-full border px-4 py-2 rounded-lg"
          />
        </div>

        <div id="emailBox">
          <label class="block text-sm font-medium mb-1">Email</label>
          <input 
            type="email" 
            id="email"
            placeholder="example@gmail.com"
            class="w-full border px-4 py-2 rounded-lg"
          />
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">First Name</label>
          <input 
            type="text" 
            id="first_name"
            placeholder="First name"
            class="w-full border px-4 py-2 rounded-lg"
            required
          />
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Last Name</label>
          <input 
            type="text" 
            id="last_name"
            placeholder="Last name"
            class="w-full border px-4 py-2 rounded-lg"
            required
          />
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Phone</label>
          <input 
            type="text" 
            id="phone"
            placeholder="01700000000"
            class="w-full border px-4 py-2 rounded-lg"
            required
          />
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Password</label>
          <input 
            type="password" 
            id="password"
            placeholder="Welcome@123"
            class="w-full border px-4 py-2 rounded-lg"
            required
          />
        </div>

        <div class="md:col-span-2">
          <button 
            type="submit"
            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg"
          >
            Create User
          </button>
        </div>
      </form>

      <p id="message" class="mt-4 text-sm"></p>
    </div>


    <!-- User List -->
    <div class="bg-white p-6 rounded-lg shadow">
      <h2 class="text-2xl font-bold mb-4">All Users</h2>

      <div class="overflow-x-auto">
        <table class="w-full border-collapse">
          <thead>
            <tr class="bg-gray-200 text-left">
              <th class="p-3 border">ID</th>
              <th class="p-3 border">Name</th>
              <th class="p-3 border">Email / Student ID</th>
              <th class="p-3 border">Phone</th>
              <th class="p-3 border">Role</th>
              <th class="p-3 border">Status</th>
              <th class="p-3 border">Action</th>
            </tr>
          </thead>

          <tbody id="userTableBody">
            <tr>
              <td colspan="7" class="p-4 text-center text-gray-500">
                Loading users...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>


  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/admin-users.js"></script>

</body>
</html>
