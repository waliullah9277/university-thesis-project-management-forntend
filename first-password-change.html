<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>First Password Change</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen bg-gray-100 flex items-center justify-center">

  <div class="w-full max-w-md bg-white shadow-lg rounded-xl p-8">
    <h1 class="text-2xl font-bold text-center mb-6">
      Change Password
    </h1>

    <form id="passwordForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1">New Password</label>
        <input 
          type="password" 
          id="new_password"
          class="w-full border rounded-lg px-4 py-2"
          required
        />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Confirm Password</label>
        <input 
          type="password" 
          id="confirm_password"
          class="w-full border rounded-lg px-4 py-2"
          required
        />
      </div>

      <button 
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg"
      >
        Change Password
      </button>
    </form>

    <p id="message" class="text-center mt-4 text-sm"></p>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/auth.js"></script>

  <script>
    checkAuth();

    const passwordForm = document.getElementById("passwordForm");
    const message = document.getElementById("message");

    passwordForm.addEventListener("submit", async function(event) {
      event.preventDefault();

      const newPassword = document.getElementById("new_password").value;
      const confirmPassword = document.getElementById("confirm_password").value;

      const data = await apiRequest("/api/auth/first-password-change/", "POST", {
        new_password: newPassword,
        confirm_password: confirmPassword,
      });

      if (data.success) {
        message.textContent = "Password changed successfully.";
        message.className = "text-center mt-4 text-sm text-green-600";

        const role = getUserRole();

        setTimeout(function() {
          if (role === "SUPER_ADMIN") {
            window.location.href = "admin/dashboard.html";
          } else if (role === "STUDENT") {
            window.location.href = "student/dashboard.html";
          } else if (role === "SUPERVISOR") {
            window.location.href = "supervisor/dashboard.html";
          } else if (role === "EXAMINER") {
            window.location.href = "examiner/dashboard.html";
          }
        }, 800);
      } else {
        message.textContent = data.message || "Password change failed.";
        message.className = "text-center mt-4 text-sm text-red-600";
      }
    });
  </script>
</body>
</html>
